<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일지 작성 - Nuri GPT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #436834;
      --color-primary-dim: #375c29;
      --color-primary-container: #c3efad;
      --color-surface: #f8faf8;
      --color-surface-container-low: #f1f4f2;
      --color-surface-container: #eaefec;
      --color-surface-container-lowest: #ffffff;
      --color-on-surface: #2d3432;
      --color-on-surface-variant: #59615f;
      --color-outline-variant: #acb3b1;
      --color-secondary: #0060ad;
      --color-secondary-container: #d1e4ff;
    }
    
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    .font-headline {
      font-family: 'Manrope', sans-serif;
    }
    
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    
    /* Section collapse animation */
    .section-content {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    
    .section-content.collapsed {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
      margin-bottom: 0;
    }
    
    .section-header {
      cursor: pointer;
      transition: background 0.2s ease;
    }
    
    .section-header:hover {
      background: rgba(67, 104, 52, 0.03);
    }
    
    .chevron {
      transition: transform 0.2s ease;
    }
    
    .section-header.collapsed .chevron {
      transform: rotate(-90deg);
    }
    
    /* Depth-based styling */
    .depth-0 {
      background: transparent;
      padding: 0;
    }
    
    /* Depth 1: Major Sections (e.g., 놀이, 일상생활) */
    .depth-1 {
      background: var(--color-surface-container-lowest);
      border-radius: 1.5rem;
      margin-top: 2rem;
      box-shadow: 0 4px 12px rgba(45, 52, 50, 0.04);
      border: 1px solid rgba(172, 179, 177, 0.15);
      overflow: hidden;
    }
    
    .depth-1-header {
      background: linear-gradient(to right, rgba(67, 104, 52, 0.08), transparent);
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid rgba(172, 179, 177, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .depth-1-content {
      padding: 1.5rem;
    }
    
    /* Depth 2: Sub-categories (e.g., 활동, 실내놀이) */
    .depth-2 {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px dashed rgba(172, 179, 177, 0.3);
    }
    
    .depth-2:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }
    
    /* Depth 3: Individual Fields */
    .depth-3 {
      margin-top: 1rem;
    }
    
    /* Typography by depth */
    .title-depth-1 {
      font-family: 'Manrope', sans-serif;
      font-size: 1.125rem;
      font-weight: 800;
      color: var(--color-primary);
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .title-depth-2 {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--color-on-surface);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .title-depth-2::before {
      content: "";
      width: 4px;
      height: 4px;
      background: var(--color-primary);
      border-radius: 50%;
    }
    
    .field-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--color-on-surface-variant);
      margin-bottom: 0.5rem;
      display: block;
    }
    
    /* Input styling */
    .field-textarea {
      width: 100%;
      background: var(--color-surface-container-low);
      border: none;
      border-radius: 0.75rem;
      padding: 1rem;
      color: var(--color-on-surface);
      min-height: 100px;
      resize: vertical;
      transition: all 0.2s ease;
      line-height: 1.6;
    }
    
    .field-textarea:focus {
      outline: none;
      background: var(--color-surface-container-lowest);
      box-shadow: 0 0 0 1px var(--color-primary);
    }
    
    .field-textarea::placeholder {
      color: rgba(89, 97, 95, 0.5);
    }
    
    /* OCR Button */
    .ocr-btn {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      background: rgba(209, 228, 255, 0.3);
      color: var(--color-secondary);
      border-radius: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    
    .ocr-btn:hover {
      background: rgba(209, 228, 255, 0.5);
    }
    
    /* Age selector */
    .age-select {
      background: var(--color-surface-container-low);
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      color: var(--color-on-surface);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .age-select:focus {
      outline: none;
      box-shadow: 0 0 0 1px var(--color-primary);
    }
    
    /* CTA Button */
    .generate-btn {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dim) 100%);
      box-shadow: 0 4px 20px -4px rgba(67, 104, 52, 0.3);
      transition: all 0.2s ease;
    }
    
    .generate-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px -4px rgba(67, 104, 52, 0.4);
    }
    
    .generate-btn:active {
      transform: scale(0.98);
    }
    
    /* Guidelines section */
    .guidelines-section {
      background: var(--color-surface-container-low);
      border-radius: 1rem;
      padding: 1.25rem;
    }
    
    /* Template badge */
    .template-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--color-primary-container);
      color: var(--color-primary-dim);
      border-radius: 2rem;
      font-size: 0.875rem;
      font-weight: 600;
    }
    
    /* Scroll area */
    .form-scroll-area {
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    
    .form-scroll-area::-webkit-scrollbar {
      width: 4px;
    }
    
    .form-scroll-area::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .form-scroll-area::-webkit-scrollbar-thumb {
      background: var(--color-outline-variant);
      border-radius: 2px;
    }
    
    /* Fade animations */
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen py-8 px-4" style="background: var(--color-surface)">
  <div class="max-w-3xl mx-auto">
    <!-- Main Container -->
    <div class="glass-panel rounded-3xl shadow-sm border border-white/60 p-8 md:p-12 min-h-[600px] flex flex-col">
      
      <!-- Header -->
      <header class="mb-8 fade-in">
        <div class="flex items-center justify-between mb-6">
          <button class="group flex items-center gap-2 transition-colors" style="color: var(--color-on-surface-variant)" onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color='var(--color-on-surface-variant)'">
            <div class="w-10 h-10 rounded-full flex items-center justify-center transition-colors" style="background: var(--color-surface-container-low)" onmouseover="this.style.background='rgba(67,104,52,0.08)'" onmouseout="this.style.background='var(--color-surface-container-low)'">
              <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </div>
          </button>
        </div>
        
        <h1 class="font-headline text-2xl md:text-3xl font-bold tracking-tight mb-2" style="color: var(--color-on-surface)">
          보육일지 작성
        </h1>
        <p class="text-sm" style="color: var(--color-on-surface-variant)">
          템플릿을 바탕으로 관찰 내용을 입력하세요
        </p>
      </header>

      <!-- Template Info & Age Selection -->
      <div class="mb-6 fade-in" style="animation-delay: 0.1s">
        <div class="flex flex-col sm:flex-row sm:items-center gap-4 p-4 rounded-2xl" style="background: var(--color-surface-container-low)">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--color-primary-container); color: var(--color-primary)">
              <i data-lucide="file-text" class="w-5 h-5"></i>
            </div>
            <div>
              <p class="text-xs font-medium mb-0.5" style="color: var(--color-on-surface-variant)">사용 중인 템플릿</p>
              <p class="font-semibold" style="color: var(--color-on-surface)">일상생활 관찰일지</p>
            </div>
          </div>
          
          <div class="sm:ml-auto flex items-center gap-3">
            <label class="text-sm font-medium" style="color: var(--color-on-surface-variant)">대상 연령</label>
            <select class="age-select text-sm font-medium">
              <option value="">선택</option>
              <option value="0">0세</option>
              <option value="1">1세</option>
              <option value="2">2세</option>
              <option value="3" selected>3세</option>
              <option value="4">4세</option>
              <option value="5">5세</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Form Tree (Scrollable) -->
      <div class="form-scroll-area flex-1 fade-in mb-6" style="animation-delay: 0.15s">
        
        <div class="depth-0">
          
          <!-- Section: 놀이 (Depth 1) -->
          <div class="depth-1">
            <div class="depth-1-header section-header" onclick="toggleSection(this)">
              <h3 class="title-depth-1">
                <i data-lucide="palmtree" class="w-5 h-5"></i>
                <span>놀이</span>
              </h3>
              <i data-lucide="chevron-down" class="w-5 h-5 chevron" style="color: var(--color-on-surface-variant)"></i>
            </div>
            
            <div class="depth-1-content section-content">
              
              <!-- Sub-section: 활동 (Depth 2) -->
              <div class="depth-2">
                <h4 class="title-depth-2">활동</h4>
                <!-- Field: 내용 (Depth 3) -->
                <div class="depth-3">
                  <div class="flex items-center justify-between mb-2">
                    <label class="field-label">내용</label>
                    <button class="ocr-btn">
                      <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                      <span>OCR 업로드</span>
                    </button>
                  </div>
                  <textarea class="field-textarea" placeholder="활동 내용을 입력하세요..."></textarea>
                </div>
              </div>
              
              <!-- Sub-section: 실내놀이 (Depth 2) -->
              <div class="depth-2">
                <h4 class="title-depth-2">실내놀이</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <!-- Field: 놀이상황 (Depth 3) -->
                  <div class="depth-3">
                    <div class="flex items-center justify-between mb-2">
                      <label class="field-label">놀이상황</label>
                      <button class="ocr-btn">
                        <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                        <span>OCR</span>
                      </button>
                    </div>
                    <textarea class="field-textarea" placeholder="놀이상황을 입력하세요..."></textarea>
                  </div>
                  
                  <!-- Field: 놀이지원 (Depth 3) -->
                  <div class="depth-3">
                    <div class="flex items-center justify-between mb-2">
                      <label class="field-label">놀이지원</label>
                      <button class="ocr-btn">
                        <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                        <span>OCR</span>
                      </button>
                    </div>
                    <textarea class="field-textarea" placeholder="놀이지원 내용을 입력하세요..."></textarea>
                  </div>
                </div>
              </div>
              
              <!-- Sub-section: 바깥놀이 (Depth 2) -->
              <div class="depth-2">
                <h4 class="title-depth-2">바깥놀이</h4>
                <div class="depth-3">
                  <div class="flex items-center justify-between mb-2">
                    <label class="field-label">놀이상황</label>
                    <button class="ocr-btn">
                      <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                      <span>OCR</span>
                    </button>
                  </div>
                  <textarea class="field-textarea" placeholder="바깥놀이 상황을 입력하세요..."></textarea>
                </div>
              </div>
              
            </div>
          </div>
          
          <!-- Section: 일상생활 (Depth 1) -->
          <div class="depth-1">
            <div class="depth-1-header section-header" onclick="toggleSection(this)">
              <h3 class="title-depth-1">
                <i data-lucide="coffee" class="w-5 h-5"></i>
                <span>일상생활</span>
              </h3>
              <i data-lucide="chevron-down" class="w-5 h-5 chevron" style="color: var(--color-on-surface-variant)"></i>
            </div>
            
            <div class="depth-1-content section-content">
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Field: 간식 (Depth 3) -->
                <div class="depth-3">
                  <div class="flex items-center justify-between mb-2">
                    <label class="field-label">간식</label>
                    <button class="ocr-btn">
                      <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                      <span>OCR</span>
                    </button>
                  </div>
                  <textarea class="field-textarea" placeholder="간식 관련 내용을 입력하세요..."></textarea>
                </div>
                
                <!-- Field: 점심식사 (Depth 3) -->
                <div class="depth-3">
                  <div class="flex items-center justify-between mb-2">
                    <label class="field-label">점심식사</label>
                    <button class="ocr-btn">
                      <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                      <span>OCR</span>
                    </button>
                  </div>
                  <textarea class="field-textarea" placeholder="점심식사 관련 내용을 입력하세요..."></textarea>
                </div>
                
                <!-- Field: 낮잠 및 휴식 (Depth 3) -->
                <div class="depth-3">
                  <div class="flex items-center justify-between mb-2">
                    <label class="field-label">낮잠 및 휴식</label>
                    <button class="ocr-btn">
                      <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                      <span>OCR</span>
                    </button>
                  </div>
                  <textarea class="field-textarea" placeholder="낮잠 및 휴식 관련 내용을 입력하세요..."></textarea>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Section: 통합보육 (Depth 1) -->
          <div class="depth-1">
            <div class="depth-1-header section-header" onclick="toggleSection(this)">
              <h3 class="title-depth-1">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span>통합보육</span>
              </h3>
              <i data-lucide="chevron-down" class="w-5 h-5 chevron" style="color: var(--color-on-surface-variant)"></i>
            </div>
            
            <div class="depth-1-content section-content">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="depth-3">
                  <div class="flex items-center justify-between mb-2">
                    <label class="field-label">등원</label>
                    <button class="ocr-btn">
                      <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                      <span>OCR</span>
                    </button>
                  </div>
                  <textarea class="field-textarea" placeholder="등원 상황을 입력하세요..."></textarea>
                </div>
                
                <div class="depth-3">
                  <div class="flex items-center justify-between mb-2">
                    <label class="field-label">하원</label>
                    <button class="ocr-btn">
                      <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                      <span>OCR</span>
                    </button>
                  </div>
                  <textarea class="field-textarea" placeholder="하원 상황을 입력하세요..."></textarea>
                </div>
              </div>
            </div>
          </div>
          
        </div>
      </div>

      <!-- Additional Guidelines -->
      <div class="guidelines-section mb-6 fade-in" style="animation-delay: 0.2s">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="message-square" class="w-4 h-4" style="color: var(--color-primary)"></i>
          <label class="text-sm font-semibold" style="color: var(--color-on-surface)">추가 지침 (선택사항)</label>
        </div>
        <textarea class="field-textarea min-h-[80px]" placeholder="전체적인 작성 방향이나 특별히 강조하고 싶은 내용이 있다면 입력하세요..."></textarea>
      </div>

      <!-- Action Footer -->
      <footer class="fade-in space-y-3" style="animation-delay: 0.25s">
        <button class="generate-btn w-full py-4 rounded-xl text-white font-semibold text-base flex items-center justify-center gap-2">
          <i data-lucide="sparkles" class="w-5 h-5"></i>
          <span>일지 생성하기</span>
        </button>
        
        <!-- 목업 테스트용: 결과 화면 이동 버튼 -->
        <a href="log-result-mockup.html" class="block w-full py-3 rounded-xl text-center font-medium text-sm transition-all border border-dashed hover:bg-opacity-5" style="color: var(--color-primary); border-color: var(--color-outline-variant); background: rgba(67, 104, 52, 0.02)" onmouseover="this.style.borderColor='var(--color-primary)'; this.style.background='rgba(67, 104, 52, 0.05)'" onmouseout="this.style.borderColor='var(--color-outline-variant)'; this.style.background='rgba(67, 104, 52, 0.02)'">
          <span class="flex items-center justify-center gap-2">
            <i data-lucide="eye" class="w-4 h-4"></i>
            목업: 결과 화면 보기
          </span>
        </a>
        
        <p class="text-center text-xs" style="color: var(--color-on-surface-variant)">
          <i data-lucide="cloud-off" class="w-3 h-3 inline-block mr-1"></i>
          입력 내용은 서버에 자동 저장되지 않습니다
        </p>
      </footer>

    </div>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();
    
    // Section collapse/expand
    function toggleSection(header) {
      const content = header.nextElementSibling;
      const isCollapsed = content.classList.contains('collapsed');
      
      if (isCollapsed) {
        content.classList.remove('collapsed');
        header.classList.remove('collapsed');
        content.style.maxHeight = content.scrollHeight + 'px';
        setTimeout(() => {
          content.style.maxHeight = '';
        }, 300);
      } else {
        content.style.maxHeight = content.scrollHeight + 'px';
        content.offsetHeight; // Force reflow
        content.classList.add('collapsed');
        header.classList.add('collapsed');
      }
    }
  </script>
</body>
</html>
