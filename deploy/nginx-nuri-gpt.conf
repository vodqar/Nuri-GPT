# nuri-gpt.vodqar.com — 호스트 nginx 리버스 프록시 설정
# 복사 위치: /etc/nginx/sites-available/nuri-gpt
# 활성화: ln -s /etc/nginx/sites-available/nuri-gpt /etc/nginx/sites-enabled/
# 적용: sudo nginx -t && sudo systemctl reload nginx
#
# 사전 조건:
#   - Cloudflare DNS: nuri-gpt.vodqar.com A 레코드 → 집 공인IP
#   - 공유기: 외부 443 → 로컬 443 포트포워딩
#   - SSL 인증서: 기존 letsencrypt 경로 재사용

server {
    listen 80;
    server_name nuri-gpt.vodqar.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nuri-gpt.vodqar.com;

    # 템플릿 이미지 업로드 대응
    client_max_body_size 10M;

    # SSL: 기존 letsencrypt 인증서 재사용 (경로를 실제 환경에 맞게 수정)
    ssl_certificate /etc/letsencrypt/live/vodqar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vodqar.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE (인삿말 스트리밍 등)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # AI 생성 API 장시간 응답 대응
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
